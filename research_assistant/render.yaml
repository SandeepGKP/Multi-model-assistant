services:
  - type: web
    name: research-assistant
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn research_assistant.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 --keep-alive 5"
    deployCommand: "python manage.py migrate --noinput"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: research_assistant.settings
      - key: PYTHON_VERSION
        value: 3.12.4
